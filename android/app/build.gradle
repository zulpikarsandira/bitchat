apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

android {
    namespace "com.bitchat"
    compileSdkVersion rootProject.ext.compileSdkVersion
    
    defaultConfig {
        applicationId "com.bitchat"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    react {
        /* Folders */
        //   The root of your project, i.e. where "package.json" lives. Default is '..'
        // root = file("../")
        //   The folder where the react-native package is. Default is ../node_modules/react-native
        // reactNativeDir = file("../node_modules/react-native")
        //   The gradle-plugin shell script. Default is ../node_modules/@react-native/gradle-plugin/react-native-gradle-helper.js
        // codegenDir = file("../node_modules/@react-native/gradle-plugin")
        //   The entry file for bundle isolation. Default is index.android.js or index.js
        // entryFile = file("../index.js")

        /* Variants */
        //   The list of variants to build. Default is ['debug', 'release']
        // debuggableVariants = ["debug"]

        /* Bundling */
        //   A list of extra flags to pass to the "bundle" commands.
        //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
        // extraPackagerArgs = []

        /* Hermes */
        enableHermes = (findProperty('hermesEnabled') ?: 'true').toBoolean()
    }

    buildFeatures {
        buildConfig true
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file('release.keystore')
            storePassword 'bitchat123'
            keyAlias 'bitchat-alias'
            keyPassword 'bitchat123'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    repositories {
        flatDir {
            dirs 'libs'
        }
    }
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation "com.facebook.react:react-android"
    implementation(name: 'chatengine', ext: 'aar')
}


apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
